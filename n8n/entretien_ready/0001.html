<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCM n8n — Prêt pour l'entretien</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #e85d26;
    --accent2: #f0a500;
    --green: #2ecc71;
    --red: #e74c3c;
    --text: #e8e8f0;
    --muted: #6b6b82;
    --radius: 12px;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(232,93,38,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(240,165,0,0.06) 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo-tag {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 5px 14px;
    border-radius: 4px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  header h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
  }

  header h1 span { color: var(--accent); }

  header p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 14px;
    font-family: 'Space Mono', monospace;
  }

  .quiz-wrapper {
    width: 100%;
    max-width: 720px;
  }

  /* Progress */
  .progress-bar-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }

  .progress-bar-bg {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  .progress-label {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 36px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .q-number {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .q-text {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 28px;
    letter-spacing: -0.3px;
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    width: 100%;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(232,93,38,0.06);
    transform: translateX(4px);
  }

  .option-btn.selected {
    border-color: var(--accent2);
    background: rgba(240,165,0,0.08);
  }

  .option-btn.correct {
    border-color: var(--green);
    background: rgba(46,204,113,0.1);
  }

  .option-btn.wrong {
    border-color: var(--red);
    background: rgba(231,76,60,0.08);
  }

  .option-btn:disabled {
    cursor: default;
  }

  .letter {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .option-btn.selected .letter { background: var(--accent2); color: #000; }
  .option-btn.correct .letter { background: var(--green); color: #000; }
  .option-btn.wrong .letter { background: var(--red); color: #fff; }

  /* Explanation */
  .explanation {
    display: none;
    background: rgba(255,255,255,0.03);
    border-left: 3px solid var(--accent2);
    border-radius: 0 8px 8px 0;
    padding: 12px 16px;
    font-size: 13px;
    font-family: 'Space Mono', monospace;
    color: var(--accent2);
    margin-bottom: 20px;
    animation: fadeIn 0.3s ease;
  }

  .explanation.show { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Actions */
  .actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
  }

  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 12px 24px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.5px;
  }

  .btn-validate {
    background: var(--accent);
    color: #fff;
  }

  .btn-validate:hover:not(:disabled) {
    background: #ff6a30;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(232,93,38,0.4);
  }

  .btn-validate:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn-next {
    background: var(--accent2);
    color: #000;
    display: none;
  }

  .btn-next:hover {
    background: #ffc61a;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(240,165,0,0.35);
  }

  .btn-next.visible { display: block; }

  /* Results */
  .results {
    display: none;
    text-align: center;
    padding: 20px 0;
    animation: fadeIn 0.4s ease;
  }

  .results.show { display: block; }

  .score-ring {
    width: 160px;
    height: 160px;
    margin: 0 auto 28px;
    position: relative;
  }

  .score-ring svg {
    transform: rotate(-90deg);
  }

  .score-ring circle {
    fill: none;
    stroke-width: 10;
    stroke-linecap: round;
  }

  .score-ring .bg-circle { stroke: var(--border); }
  .score-ring .fg-circle {
    stroke: var(--accent);
    stroke-dasharray: 408;
    stroke-dashoffset: 408;
    transition: stroke-dashoffset 1s cubic-bezier(.4,0,.2,1) 0.2s;
  }

  .score-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .score-num {
    font-size: 2.4rem;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .score-denom {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .score-pct {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .score-msg {
    color: var(--muted);
    font-size: 14px;
    font-family: 'Space Mono', monospace;
    margin-bottom: 28px;
  }

  .btn-restart {
    background: var(--accent);
    color: #fff;
    padding: 14px 36px;
    font-size: 16px;
  }

  .btn-restart:hover {
    background: #ff6a30;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(232,93,38,0.4);
  }

  @media (max-width: 500px) {
    .card { padding: 24px 18px; }
    .q-text { font-size: 1.05rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-tag">QCM Certification</div>
  <h1>Maîtriser <span>n8n</span></h1>
  <p>20 questions · Niveau débutant · Entretien IA ready</p>
</header>

<div class="quiz-wrapper">
  <div class="progress-bar-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <span class="progress-label" id="progressLabel">0 / 20</span>
  </div>

  <div class="card" id="quizCard">
    <div id="quizContent">
      <div class="q-number" id="qNumber">Question 1 / 20</div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="optionsContainer"></div>
      <div class="explanation" id="explanation"></div>
      <div class="actions">
        <button class="btn btn-validate" id="btnValidate" disabled>Valider</button>
        <button class="btn btn-next" id="btnNext">Suivant →</button>
      </div>
    </div>

    <div class="results" id="results">
      <div class="score-ring">
        <svg width="160" height="160" viewBox="0 0 140 140">
          <circle class="bg-circle" cx="70" cy="70" r="65"/>
          <circle class="fg-circle" id="ringFg" cx="70" cy="70" r="65"/>
        </svg>
        <div class="score-center">
          <div class="score-num" id="scoreNum">0</div>
          <div class="score-denom">/ 20</div>
        </div>
      </div>
      <div class="score-pct" id="scorePct"></div>
      <div class="score-msg" id="scoreMsg"></div>
      <button class="btn btn-restart" onclick="restartQuiz()">↺ Recommencer</button>
    </div>
  </div>
</div>

<script>
const questions = [
  {
    q: "Qu'est-ce que n8n ?",
    options: ["Un framework Python pour ML", "Une plateforme d'automatisation de workflows", "Un gestionnaire de bases de données", "Un IDE pour développeurs"],
    correct: 1,
    expl: "n8n automatise des workflows entre applications."
  },
  {
    q: "Comment appelle-t-on un bloc de traitement dans n8n ?",
    options: ["Un script", "Un pipeline", "Un node (nœud)", "Un service"],
    correct: 2,
    expl: "Chaque étape du workflow est un node."
  },
  {
    q: "Quel type de licence n8n utilise-t-il ?",
    options: ["MIT open-source pure", "Propriétaire fermée", "Sustainable Use License (fair-code)", "Apache 2.0"],
    correct: 2,
    expl: "n8n est fair-code, auto-hébergeable gratuitement."
  },
  {
    q: "Que permet le node 'Webhook' dans n8n ?",
    options: ["Envoyer des emails automatiquement", "Recevoir des requêtes HTTP externes", "Générer des rapports PDF", "Connecter à des bases SQL"],
    correct: 1,
    expl: "Webhook reçoit des données via HTTP entrant."
  },
  {
    q: "Comment les données circulent-elles entre les nodes ?",
    options: ["Via des fichiers CSV partagés", "Via des variables globales", "Via des items JSON passés entre nodes", "Via une base de données centrale"],
    correct: 2,
    expl: "n8n passe des items JSON d'un node à l'autre."
  },
  {
    q: "Quel node permet de conditionner l'exécution selon une règle ?",
    options: ["Execute Command", "IF", "Merge", "Split In Batches"],
    correct: 1,
    expl: "Le node IF crée des branches conditionnelles."
  },
  {
    q: "Dans n8n, qu'est-ce qu'un 'credential' ?",
    options: ["Un log d'exécution", "Des informations d'authentification stockées", "Un type de node spécial", "Un webhook sécurisé"],
    correct: 1,
    expl: "Les credentials stockent clés API et mots de passe."
  },
  {
    q: "Quel node est utilisé pour exécuter du code JavaScript personnalisé ?",
    options: ["HTTP Request", "Function / Code", "Set", "Switch"],
    correct: 1,
    expl: "Le node Code exécute du JS personnalisé."
  },
  {
    q: "Comment déclencher un workflow automatiquement à heure fixe ?",
    options: ["Avec le node Webhook", "Avec le node Schedule Trigger", "Avec le node Start", "Avec le node Loop"],
    correct: 1,
    expl: "Schedule Trigger planifie avec une syntaxe cron."
  },
  {
    q: "Qu'est-ce qu'un 'workflow' actif dans n8n ?",
    options: ["Un workflow en cours d'édition", "Un workflow déployé et exécutable automatiquement", "Un workflow sauvegardé sans trigger", "Un workflow partagé avec l'équipe"],
    correct: 1,
    expl: "Actif = déployé, écoute ses triggers."
  },
  {
    q: "Lequel de ces services n8n peut-il connecter nativement ?",
    options: ["Oracle Forms", "Slack", "SAP GUI", "COBOL systems"],
    correct: 1,
    expl: "n8n intègre nativement Slack parmi 400+ apps."
  },
  {
    q: "À quoi sert le node 'Merge' ?",
    options: ["Diviser un flux en plusieurs branches", "Combiner des données de plusieurs branches", "Supprimer des doublons", "Trier des items JSON"],
    correct: 1,
    expl: "Merge fusionne deux flux de données distincts."
  },
  {
    q: "Comment appelle-t-on l'interface visuelle de construction dans n8n ?",
    options: ["Code Editor", "Canvas / Éditeur de workflow", "Dashboard", "Pipeline Builder"],
    correct: 1,
    expl: "Le canvas est l'espace visuel drag-and-drop."
  },
  {
    q: "Qu'est-ce qu'un 'AI Agent' dans n8n ?",
    options: ["Un script Python intégré", "Un workflow autonome utilisant un LLM pour décider", "Un node de monitoring", "Un connecteur d'API REST"],
    correct: 1,
    expl: "L'agent IA utilise un LLM pour prendre des décisions."
  },
  {
    q: "Quel node permet d'appeler une API externe avec n8n ?",
    options: ["Execute Workflow", "HTTP Request", "Respond to Webhook", "Function"],
    correct: 1,
    expl: "HTTP Request appelle n'importe quelle API REST."
  },
  {
    q: "Comment référencer la valeur d'un champ précédent dans n8n ?",
    options: ["Avec la syntaxe {{ $json.nomDuChamp }}", "Avec des crochets [nomDuChamp]", "Avec la fonction get(nomDuChamp)", "Avec une variable globale $var"],
    correct: 0,
    expl: "L'expression {{ $json.field }} accède aux données JSON."
  },
  {
    q: "Qu'est-ce que 'n8n Cloud' par rapport à l'auto-hébergement ?",
    options: ["Une version moins fonctionnelle", "La version hébergée et gérée par n8n.io", "Un plugin pour AWS", "Un outil de monitoring"],
    correct: 1,
    expl: "n8n Cloud = hébergé par n8n, sans gestion serveur."
  },
  {
    q: "Quel node permet de stopper et retourner une réponse à un Webhook entrant ?",
    options: ["HTTP Request", "Respond to Webhook", "Stop and Error", "Return"],
    correct: 1,
    expl: "Respond to Webhook renvoie la réponse HTTP."
  },
  {
    q: "Dans le contexte des agents IA n8n, qu'est-ce qu'un 'tool' ?",
    options: ["Un plugin d'interface graphique", "Une capacité externe que l'agent peut appeler", "Un type de credential", "Un fichier de configuration"],
    correct: 1,
    expl: "Un tool est une fonction que l'agent IA peut utiliser."
  },
  {
    q: "Que se passe-t-il si un node échoue dans un workflow n8n par défaut ?",
    options: ["Le workflow continue sans interruption", "Le workflow s'arrête et l'erreur est loggée", "n8n envoie un email automatiquement", "Le node est ignoré silencieusement"],
    correct: 1,
    expl: "Par défaut, une erreur stoppe le workflow."
  }
];

// Shuffle answer positions so correct answer rotates among a,b,c,d
const LETTERS = ['a', 'b', 'c', 'd'];

function buildShuffledQuestion(q, qIndex) {
  // Determine target position for correct answer (rotate 0-3)
  const targetPos = qIndex % 4;
  const opts = [...q.options];
  const correctText = opts[q.correct];

  // Remove correct from opts
  const distractors = opts.filter((_, i) => i !== q.correct);

  // Build 4-slot array
  const slots = [null, null, null, null];
  slots[targetPos] = correctText;

  // Fill remaining positions with distractors
  let di = 0;
  for (let i = 0; i < 4; i++) {
    if (slots[i] === null) { slots[i] = distractors[di++]; }
  }

  return { text: q.q, options: slots, correctIdx: targetPos, expl: q.expl };
}

let currentQ = 0;
let score = 0;
let answered = false;
let builtQuestions = [];

function init() {
  builtQuestions = questions.map((q, i) => buildShuffledQuestion(q, i));
  currentQ = 0;
  score = 0;
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = builtQuestions[currentQ];
  const total = questions.length;

  document.getElementById('qNumber').textContent = `Question ${currentQ + 1} / ${total}`;
  document.getElementById('qText').textContent = q.text;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="letter">${LETTERS[i]}</span><span>${opt}</span>`;
    btn.addEventListener('click', () => selectOption(i));
    container.appendChild(btn);
  });

  document.getElementById('explanation').className = 'explanation';
  document.getElementById('explanation').textContent = '';
  document.getElementById('btnValidate').disabled = true;
  document.getElementById('btnNext').className = 'btn btn-next';

  updateProgress();
}

function selectOption(idx) {
  if (answered) return;
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', i === idx);
  });
  document.getElementById('btnValidate').dataset.selected = idx;
  document.getElementById('btnValidate').disabled = false;
}

document.getElementById('btnValidate').addEventListener('click', () => {
  if (answered) return;
  answered = true;
  const q = builtQuestions[currentQ];
  const selected = parseInt(document.getElementById('btnValidate').dataset.selected);
  const btns = document.querySelectorAll('.option-btn');

  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correctIdx) btn.classList.add('correct');
    else if (i === selected && selected !== q.correctIdx) btn.classList.add('wrong');
  });

  if (selected === q.correctIdx) score++;

  const expl = document.getElementById('explanation');
  expl.textContent = '→ ' + q.expl;
  expl.classList.add('show');

  document.getElementById('btnValidate').disabled = true;
  document.getElementById('btnNext').className = 'btn btn-next visible';
});

document.getElementById('btnNext').addEventListener('click', () => {
  currentQ++;
  if (currentQ >= questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
});

function updateProgress() {
  const pct = (currentQ / questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${currentQ} / ${questions.length}`;
}

function showResults() {
  document.getElementById('quizContent').style.display = 'none';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = `${questions.length} / ${questions.length}`;

  const results = document.getElementById('results');
  results.classList.add('show');

  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scorePct').textContent = pct + '%';

  let msg = '';
  if (pct >= 90) msg = '// Niveau expert — Entretien ready! 🚀';
  else if (pct >= 70) msg = '// Bonne base — Quelques révisions utiles';
  else if (pct >= 50) msg = '// En progression — Continue à pratiquer';
  else msg = '// Reprends les bases — Relis la doc n8n';
  document.getElementById('scoreMsg').textContent = msg;

  // Animate ring
  const circumference = 2 * Math.PI * 65;
  const offset = circumference - (pct / 100) * circumference;
  setTimeout(() => {
    document.getElementById('ringFg').style.strokeDashoffset = offset;
  }, 100);

  if (pct >= 70) {
    document.getElementById('ringFg').style.stroke = 'var(--green)';
  } else if (pct >= 50) {
    document.getElementById('ringFg').style.stroke = 'var(--accent2)';
  }
}

function restartQuiz() {
  document.getElementById('quizContent').style.display = 'block';
  document.getElementById('results').classList.remove('show');
  document.getElementById('ringFg').style.strokeDashoffset = 408;
  document.getElementById('ringFg').style.stroke = 'var(--accent)';
  init();
}

init();
</script>
</body>
</html>
