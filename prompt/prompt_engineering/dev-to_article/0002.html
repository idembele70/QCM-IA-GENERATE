<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>QCM – Prompt Engineering</title>
<style>
  body { font-family: Arial, sans-serif; background:#f5f5f5; padding:20px; }
  .qcm { max-width:800px; margin:auto; background:#fff; padding:20px; border-radius:5px; }
  h2 { margin-top:0; }
  .options label { display:block; margin:8px 0; cursor:pointer; }
  button { margin-top:15px; padding:10px 15px; }
  .feedback { margin-top:15px; font-weight:bold; }
  .explanation { margin-top:10px; font-style:italic; }
</style>
</head>
<body>

<div class="qcm">
  <h2 id="question-title"></h2>
  <div class="options" id="options"></div>
  <button id="validateBtn">Valider</button>
  <div class="feedback" id="feedback"></div>
  <div class="explanation" id="explanation"></div>
  <button id="nextBtn" style="display:none;">Question suivante</button>
</div>

<script>
const questions = [
  {
    question: "Comment est décrite la discipline du prompt engineering dans le texte ?",
    options: [
      "Comme une branche du développement logiciel",
      "Comme l’art de programmer les IA",
      "Comme l’apprentissage du langage de communication avec l’IA",
      "Comme une méthode de cryptographie"
    ],
    correct: 2,
    explanation: "Le texte compare le prompt engineering à l’apprentissage de la grammaire et du vocabulaire de la communication avec l’IA."
  },
  {
    question: "Quelle est la différence principale entre prompt engineering et context engineering ?",
    options: [
      "Le prompt engineering est technique, le context engineering non",
      "Le prompt engineering gère des workflows complets",
      "Le context engineering concerne les interactions uniques",
      "Le prompt engineering traite des interactions uniques, le context engineering des conversations longues"
    ],
    correct: 3,
    explanation: "Le texte explique que le prompt engineering se concentre sur des instructions uniques tandis que le context engineering gère des interactions complexes et longues."
  },
  {
    question: "Selon la définition simple, à quoi est comparé le prompt engineering ?",
    options: [
      "À l’écriture de code",
      "À la communication avec un expert parlant une autre langue",
      "À la traduction automatique",
      "À la conception de bases de données"
    ],
    correct: 1,
    explanation: "Le texte compare le prompt engineering à l’apprentissage de la langue d’un interlocuteur très compétent."
  },
  {
    question: "Quelle discipline n’est PAS mentionnée comme composante du prompt engineering technique ?",
    options: [
      "Psychologie",
      "Linguistique",
      "Médecine",
      "Informatique"
    ],
    correct: 2,
    explanation: "La médecine n’est pas citée parmi les disciplines contributives mentionnées."
  },
  {
    question: "Pourquoi le prompt engineering est-il accessible à tous selon le texte ?",
    options: [
      "Parce qu’il est automatisé",
      "Parce qu’il ne nécessite pas de programmation",
      "Parce qu’il remplace le code",
      "Parce qu’il est réservé aux experts"
    ],
    correct: 1,
    explanation: "Le texte précise qu’aucune connaissance en programmation n’est requise."
  },
  {
    question: "Quel élément d’un prompt décrit ce que l’on veut réellement que l’IA fasse ?",
    options: ["Format", "Contexte", "Intent", "Exemples"],
    correct: 2,
    explanation: "L’intention correspond à l’objectif réel de la demande."
  },
  {
    question: "Quel composant d’un prompt définit la structure de la réponse ?",
    options: ["Contraintes", "Format", "Intent", "Références"],
    correct: 1,
    explanation: "Le format indique comment la réponse doit être structurée."
  },
  {
    question: "Dans l’exemple du chien, quel élément est illustré par '500-word article with subheadings' ?",
    options: ["Intent", "Format", "Contexte", "Exemples"],
    correct: 1,
    explanation: "Cette indication concerne directement la structure et la longueur."
  },
  {
    question: "Quel framework est présenté comme un plan de conception des prompts ?",
    options: ["CLEAR", "SMART", "TCRTE", "ABCDE"],
    correct: 2,
    explanation: "Le texte introduit le framework TCRTE comme une méthode structurée."
  },
  {
    question: "À quoi correspond la lettre T dans TCRTE ?",
    options: ["Testing", "Task", "Tone", "Template"],
    correct: 1,
    explanation: "La lettre T représente la Task, c’est-à-dire la tâche."
  },
  {
    question: "Quel élément du TCRTE précise pour qui et pourquoi on effectue la tâche ?",
    options: ["Task", "Context", "References", "Testing"],
    correct: 1,
    explanation: "Le Context donne les informations sur l’audience et la raison."
  },
  {
    question: "Quel est le rôle principal des références dans un prompt ?",
    options: [
      "Définir les métriques de succès",
      "Guider le style et la qualité de la réponse",
      "Limiter la longueur",
      "Tester les performances"
    ],
    correct: 1,
    explanation: "Les références servent d’exemples ou de guides stylistiques."
  },
  {
    question: "Que permet la partie Testing dans le TCRTE ?",
    options: [
      "D’améliorer le ton émotionnel",
      "De vérifier si la sortie respecte les critères",
      "D’ajouter de nouveaux exemples",
      "De définir le contexte"
    ],
    correct: 1,
    explanation: "Le Testing sert à valider la qualité et la conformité du résultat."
  },
  {
    question: "Quel est l’objectif principal de la phase Enhancement ?",
    options: [
      "Créer le prompt initial",
      "Réécrire entièrement la sortie",
      "Affiner et améliorer par itération",
      "Supprimer les contraintes"
    ],
    correct: 2,
    explanation: "L’Enhancement concerne l’amélioration continue du résultat."
  },
  {
    question: "Quelle technique encourage l’IA à montrer son raisonnement étape par étape ?",
    options: [
      "Few-shot learning",
      "Recursive prompting",
      "Chain-of-thought prompting",
      "Persona-based prompting"
    ],
    correct: 2,
    explanation: "Le chain-of-thought prompting demande explicitement le raisonnement."
  },
  {
    question: "Quel est l’avantage principal du few-shot learning ?",
    options: [
      "Réduire la longueur de la réponse",
      "Fournir des exemples pour guider le modèle",
      "Supprimer le contexte",
      "Automatiser la validation"
    ],
    correct: 1,
    explanation: "Des exemples permettent à l’IA de comprendre le format attendu."
  },
  {
    question: "Quelle technique consiste à diviser une tâche complexe en plusieurs étapes ?",
    options: [
      "Multi-step prompting",
      "Persona-based prompting",
      "Constraint-based creativity",
      "Recursive prompting"
    ],
    correct: 0,
    explanation: "Le multi-step prompting découpe une tâche en sous-étapes successives."
  },
  {
    question: "Que permet le persona-based prompting ?",
    options: [
      "D’imposer un budget",
      "D’adopter des points de vue spécifiques",
      "D’améliorer le SEO",
      "De réduire le contexte"
    ],
    correct: 1,
    explanation: "Cette technique assigne des rôles ou personnalités spécifiques à l’IA."
  },
  {
    question: "Quel est le risque principal des instructions vagues selon le texte ?",
    options: [
      "Des réponses trop longues",
      "Des résultats imprécis",
      "Des erreurs techniques",
      "Une surcharge de contexte"
    ],
    correct: 1,
    explanation: "Les instructions vagues produisent des résultats peu ciblés."
  },
  {
    question: "Quel acronyme est proposé pour éviter les erreurs courantes ?",
    options: ["TCRTE", "SMART", "CLEAR", "ABCDE"],
    correct: 2,
    explanation: "La méthode CLEAR est présentée pour structurer efficacement les prompts."
  }
];

let current = 0;
let score = 0;

const title = document.getElementById("question-title");
const optionsDiv = document.getElementById("options");
const feedback = document.getElementById("feedback");
const explanation = document.getElementById("explanation");
const validateBtn = document.getElementById("validateBtn");
const nextBtn = document.getElementById("nextBtn");

function loadQuestion() {
  const q = questions[current];
  title.textContent = `Question ${current + 1} : ${q.question}`;
  optionsDiv.innerHTML = "";
  feedback.textContent = "";
  explanation.textContent = "";
  validateBtn.disabled = false;
  nextBtn.style.display = "none";

  q.options.forEach((opt, i) => {
    const label = document.createElement("label");
    label.innerHTML = `<input type="radio" name="option" value="${i}"> ${String.fromCharCode(65+i)}. ${opt}`;
    optionsDiv.appendChild(label);
  });
}

validateBtn.onclick = () => {
  const selected = document.querySelector("input[name='option']:checked");
  if (!selected) return;

  const answer = parseInt(selected.value);
  document.querySelectorAll("input[name='option']").forEach(i => i.disabled = true);
  validateBtn.disabled = true;

  if (answer === questions[current].correct) {
    feedback.textContent = "✅ Bonne réponse !";
    score++;
  } else {
    feedback.textContent = "❌ Mauvaise réponse";
  }
  explanation.textContent = questions[current].explanation;
  nextBtn.style.display = "inline-block";
};

nextBtn.onclick = () => {
  current++;
  if (current < questions.length) {
    loadQuestion();
  } else {
    document.querySelector(".qcm").innerHTML =
      `<h2>QCM terminé</h2><p>Votre score : ${score} / ${questions.length}</p>`;
  }
};

loadQuestion();
</script>

</body>
</html>
